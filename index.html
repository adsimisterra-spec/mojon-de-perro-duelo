<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mojón de Perro - Duelo</title>
    <style>
        body { background-color: #222; display: flex; flex-direction: column; align-items: center; color: white; font-family: Arial; }
        canvas { border: 5px solid #444; background: linear-gradient(to bottom, #5dade2, #2e86c1); box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .controls { margin-top: 20px; display: flex; gap: 20px; align-items: center; }
        button { background-color: #e74c3c; color: white; border: none; padding: 15px 30px; font-size: 18px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        button:hover { background-color: #c0392b; }
    </style>
</head>
<body>
    <h1>Mojón de Perro: El Duelo</h1>
    <canvas id="gameCanvas" width="900" height="650"></canvas>
    
    <div class="controls">
        <button id="btnLanzar">LANZAR (Espacio)</button>
        <div>
            <p>P1: Flechas | P2: WASD</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
